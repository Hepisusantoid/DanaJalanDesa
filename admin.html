<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 Panel Admin - Ruang Kerja Panitia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 antialiased flex flex-col min-h-screen">

    <!-- LAYER LOADING KONEKSI -->
    <div id="loading-screen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-4">
        <div class="text-3xl animate-bounce">🔑</div>
        <p class="text-xs text-slate-500 mt-3 font-medium">Memverifikasi gerbang admin...</p>
    </div>

    <!-- LAYER PROTEKSI: WAJIB LOGIN & WHITELIST EMAIL -->
    <div id="admin-auth-screen" class="fixed inset-0 bg-slate-950 z-40 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-xl w-full max-w-sm space-y-4 text-center">
            <div class="w-12 h-12 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto text-blue-400 text-xl font-bold">🔑</div>
            <div>
                <h3 class="text-base font-bold text-slate-200">Otorisasi Akun Panitia</h3>
                <p class="text-xs text-slate-400 mt-1">Anda wajib login menggunakan akun Google yang terdaftar dalam whitelist untuk mengelola anggaran swadaya desa.</p>
            </div>
            <button onclick="loginGoogleAdmin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold text-xs py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                Sign In dengan Google
            </button>
            <p id="error-admin-msg" class="text-xs text-rose-400 font-semibold hidden bg-rose-500/10 p-2 rounded-lg border border-rose-500/20"></p>
        </div>
    </div>

    <!-- AREA KERJA ADMIN -->
    <div id="admin-main-content" class="hidden flex flex-col min-h-screen">
        <header class="bg-slate-800 border-b border-slate-700 py-3 px-4 sticky top-0 z-30">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-sm font-bold text-slate-200">Ruang Kerja Panitia</h1>
                    <p id="admin-email-display" class="text-[10px] text-slate-400"></p>
                </div>
                <div class="flex gap-2">
                    <a href="/" class="text-[11px] bg-slate-700 hover:bg-slate-600 text-slate-200 px-2.5 py-1.5 rounded-lg font-medium transition-all">← Web Warga</a>
                    <button onclick="logoutAdmin()" class="bg-rose-700/80 hover:bg-rose-700 text-white text-xs px-2.5 py-1 rounded-lg">Keluar</button>
                </div>
            </div>
        </header>

        <main class="max-w-md w-full mx-auto px-4 py-4 space-y-5 flex-1 mb-10">
            
            <!-- KOTAK 1: MANAJEMEN SESI MUSIM -->
            <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 space-y-3">
                <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-wider">🌾 Tambah Sesi Musim Baru</h3>
                <div class="space-y-2">
                    <input type="text" id="musim-nama" placeholder="Contoh: Rendeng 2026 / Gadu 2026" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-200 outline-none focus:border-emerald-500">
                    <input type="number" inputmode="numeric" id="musim-gaji" placeholder="Anggaran Insentif Panitia (Rp)" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-200 outline-none focus:border-emerald-500">
                    <button onclick="tambahMusim()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2.5 rounded-lg transition-all shadow-md">
                        + Buat Sesi Musim
                    </button>
                </div>
            </div>

            <!-- KOTAK 2: INPUT TRANSAKSI (KAS MASUK / KAS KELUAR) -->
            <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 space-y-3">
                <div class="flex justify-between items-center">
                    <h3 id="form-tx-title" class="text-xs font-bold text-blue-400 uppercase tracking-wider">✍️ Pencatatan Kas Swadaya</h3>
                    <button id="btn-batal-edit" onclick="batalEdit()" class="text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-0.5 rounded hidden">Batal Edit</button>
                </div>
                
                <div class="space-y-2">
                    <!-- ID Tersembunyi untuk Mode Edit -->
                    <input type="hidden" id="tx-edit-id" value="">

                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 font-medium">1. PILIH SESI MUSIM</label>
                        <select id="admin-select-musim" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-200 outline-none"></select>
                    </div>

                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 font-medium">2. JENIS KAS</label>
                        <div class="flex gap-2">
                            <label class="flex-1 bg-slate-900 border border-slate-700 p-2.5 rounded-lg flex items-center gap-2 text-xs cursor-pointer">
                                <input type="radio" name="tx-jenis" value="masuk" checked onchange="toggleFormInput('masuk')"> Setoran Panen (+)
                            </label>
                            <label class="flex-1 bg-slate-900 border border-slate-700 p-2.5 rounded-lg flex items-center gap-2 text-xs cursor-pointer">
                                <input type="radio" name="tx-jenis" value="keluar" onchange="toggleFormInput('keluar')"> Pengeluaran Kas (-)
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 font-medium">3. NAMA WARGA / NAMA BOS</label>
                        <input type="text" id="tx-nama" placeholder="Nama warga pembayar / Nama bos (Misal: Sumber Makmur)" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-200 outline-none">
                    </div>

                    <!-- Input Khusus Kas Masuk -->
                    <div id="form-khusus-masuk" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-1 font-medium">LOKASI LAHAN</label>
                            <input type="text" id="tx-lokasi" placeholder="Misal: Etan, Ngomah" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-200 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-1 font-medium">JUMLAH KARUNG</label>
                            <input type="number" inputmode="numeric" id="tx-karung" placeholder="Jumlah Karung" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-200 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 font-medium">4. NOMINAL RUPIAH (RP)</label>
                        <input type="number" inputmode="numeric" id="tx-nominal" placeholder="Nominal Uang (Rp)" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-200 outline-none">
                    </div>

                    <button id="btn-submit-tx" onclick="simpanTransaksi()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-3 rounded-lg transition-all shadow-md">
                        💾 Simpan Catatan Kas
                    </button>
                </div>
            </div>

            <!-- KOTAK 3: DAFTAR RIWAYAT & OPSI KELOLA DATA -->
            <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 space-y-3">
                <h3 class="text-xs font-bold text-amber-400 uppercase tracking-wider">📑 Daftar Catatan Musim Ini</h3>
                <div id="admin-list-transaksi" class="space-y-2 max-h-80 overflow-y-auto pr-1">
                    <!-- Data transaksi termuat otomatis di sini -->
                </div>
            </div>

        </main>
    </div>

    <!-- Firebase SDK Modules Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // Penyesuaian impor firestore untuk integrasi multi-modul
        import { getFirestore as firestoreDB } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let db, auth, provider, allowedEmails = [];
        let activeMusimId = "";
        let currentPanitiaName = "";
        let cacheTransaksi = {}; // Menyimpan data sementara untuk fitur edit cepat

        async function loadAdminSystem() {
            try {
                const response = await fetch('/api/config');
                if (!response.ok) throw new Error("Gagal terhubung ke API Vercel Admin (Status: " + response.status + ")");
                const config = await response.json();
                
                const app = initializeApp(config);
                db = firestoreDB(app);
                auth = getAuth(app);
                provider = new GoogleAuthProvider();

                if (config.allowedAdminEmails) {
                    allowedEmails = config.allowedAdminEmails.split(',').map(e => e.trim().toLowerCase());
                }

                document.getElementById('loading-screen').classList.add('hidden');

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        const userEmail = user.email.toLowerCase();
                        if (allowedEmails.includes(userEmail)) {
                            document.getElementById('admin-auth-screen').classList.add('hidden');
                            document.getElementById('admin-main-content').classList.remove('hidden');
                            document.getElementById('admin-email-display').textContent = "Login: " + user.email;
                            currentPanitiaName = user.displayName || user.email.split('@')[0];
                            initAdminPanel();
                        } else {
                            document.getElementById('error-admin-msg').textContent = "Akses Ditolak! Email (" + user.email + ") tidak terdaftar sebagai Panitia.";
                            document.getElementById('error-admin-msg').classList.remove('hidden');
                            signOut(auth);
                        }
                    } else {
                        document.getElementById('admin-auth-screen').classList.remove('hidden');
                        document.getElementById('admin-main-content').classList.add('hidden');
                    }
                });
            } catch (err) {
                document.getElementById('loading-screen').innerHTML = `
                    <div class="text-center p-6 bg-slate-800 rounded-2xl max-w-xs mx-auto border border-rose-500/20">
                        <p class="text-rose-400 font-bold text-sm">❌ Sistem Admin Bermasalah</p>
                        <p class="text-slate-400 text-xs mt-2 text-left bg-slate-950 p-3 rounded-lg">${err.message}</p>
                    </div>
                `;
            }
        }

        window.loginGoogleAdmin = function() {
            document.getElementById('error-admin-msg').classList.add('hidden');
            signInWithPopup(auth, provider).catch(err => alert("Gagal Login: " + err.message));
        };

        window.logoutAdmin = function() {
            signOut(auth).then(() => { location.reload(); });
        };

        window.toggleFormInput = function(jenis) {
            const khususMasuk = document.getElementById('form-khusus-masuk');
            if (jenis === 'masuk') {
                khususMasuk.classList.remove('hidden');
            } else {
                khususMasuk.classList.add('hidden');
            }
        };

        window.tambahMusim = async function() {
            const nama = document.getElementById('musim-nama').value.trim();
            const gaji = document.getElementById('musim-gaji').value.trim();

            if (!nama || !gaji) { alert("Semua kolom input musim wajib diisi!"); return; }

            try {
                // Sesi musim ditambahkan secara manual ke koleksi database
                const { collection: coll, addDoc: add } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                await add(coll(db, "sesi_musim"), {
                    nama: nama,
                    gajiPanitia: Number(gaji),
                    status: "aktif"
                });
                alert("Sesi Musim Baru berhasil disimpan!");
                location.reload();
            } catch (e) {
                alert("Gagal membuat musim baru: " + e.message);
            }
        };

        async function initAdminPanel() {
            try {
                const { collection: coll, getDocs: get } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                const selectMusim = document.getElementById('admin-select-musim');
                const querySnapshot = await get(coll(db, "sesi_musim"));
                selectMusim.innerHTML = "";
                
                querySnapshot.forEach((doc) => {
                    let data = doc.data();
                    let opt = document.createElement('option');
                    opt.value = doc.id;
                    opt.textContent = data.nama;
                    if (data.status === 'aktif') opt.selected = true;
                    selectMusim.appendChild(opt);
                });

                selectMusim.addEventListener('change', () => {
                    activeMusimId = selectMusim.value;
                    batalEdit();
                    muatHistoriTransaksi(activeMusimId);
                });

                if (selectMusim.value) {
                    activeMusimId = selectMusim.value;
                    muatHistoriTransaksi(activeMusimId);
                }
            } catch (e) {
                alert("Gagal memproses pilihan opsi database.");
            }
        }

        async function muatHistoriTransaksi(musimId) {
            const container = document.getElementById('admin-list-transaksi');
            container.innerHTML = `<p class="text-center text-xs text-slate-500 py-4">Membaca catatan kas...</p>`;

            try {
                const { collection: coll, query: qry, where: whr, getDocs: get } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                const q = qry(coll(db, "transaksi"), whr("musimId", "==", musimId));
                const querySnapshot = await get(q);
                let listData = [];
                cacheTransaksi = {}; 

                querySnapshot.forEach((doc) => {
                    let d = doc.data();
                    listData.push({ id: doc.id, ...d });
                    cacheTransaksi[doc.id] = d; 
                });

                container.innerHTML = "";
                if (listData.length === 0) {
                    container.innerHTML = `<p class="text-center text-xs text-slate-500 py-4">Belum ada transaksi di musim ini.</p>`;
                    return;
                }

                listData.sort((a,b) => b.timestamp - a.timestamp).forEach(t => {
                    let item = document.createElement('div');
                    item.className = "bg-slate-900 rounded-lg p-3 flex justify-between items-center border border-slate-800";
                    
                    let labelWarna = t.jenis === 'masuk' ? 'text-emerald-400 bg-emerald-500/10' : 'text-rose-400 bg-rose-500/10';
                    let ttdTambahan = t.jenis === 'masuk' ? `<p class="text-[11px] text-slate-400">${t.lokasi || '-'} • ${t.jumlahKarung || 0} Karung</p>` : `<p class="text-[11px] text-slate-400">Ket: ${t.keterangan || '-'}</p>`;
                    let petugasInfo = t.panitia ? `<p class="text-[9px] text-slate-500 mt-1">✍️ Oleh: ${t.panitia}</p>` : '';

                    item.innerHTML = `
                        <div class="space-y-0.5 max-w-[65%]">
                            <span class="text-[9px] px-1.5 py-0.5 rounded ${labelWarna} uppercase font-bold">${t.jenis === 'masuk' ? 'Setoran' : 'Keluar'}</span>
                            <h4 class="text-xs font-bold text-slate-200 mt-1 break-words">${t.nama}</h4>
                            ${ttdTambahan}
                            <p class="text-[10px] text-slate-500">${t.tanggal}</p>
                            ${petugasInfo}
                        </div>
                        <div class="text-right flex flex-col items-end justify-between h-full gap-3">
                            <span class="text-xs font-bold ${t.jenis === 'masuk' ? 'text-emerald-400' : 'text-rose-400'}">Rp ${Number(t.nominal).toLocaleString('id-ID')}</span>
                            <div class="flex gap-1.5">
                                <button onclick="persiapkanEdit('${t.id}')" class="text-[10px] text-amber-400 hover:text-amber-300 font-medium bg-amber-500/10 px-2 py-1 rounded border border-amber-500/20 transition-all">📝 Edit</button>
                                <button onclick="hapusDataTransaksi('${t.id}')" class="text-[10px] text-rose-500 hover:text-rose-400 font-medium bg-rose-500/10 px-2 py-1 rounded border border-rose-500/20 transition-all">🗑️ Hapus</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (e) {
                container.innerHTML = `<p class="text-center text-xs text-rose-400 py-4">Gagal memuat histori kas.</p>`;
            }
        }

        // Fungsi Memuat Data ke Form untuk Aksi Edit
        window.persiapkanEdit = function(id) {
            const data = cacheTransaksi[id];
            if (!data) return;

            document.getElementById('tx-edit-id').value = id;
            document.getElementById('tx-nama').value = data.nama;
            document.getElementById('tx-nominal').value = data.nominal;
            
            if (data.jenis === 'masuk') {
                document.querySelector('input[name="tx-jenis"][value="masuk"]').checked = true;
                toggleFormInput('masuk');
                document.getElementById('tx-lokasi').value = data.lokasi || "";
                document.getElementById('tx-karung').value = data.jumlahKarung || "";
            } else {
                document.querySelector('input[name="tx-jenis"][value="keluar"]').checked = true;
                toggleFormInput('keluar');
            }

            // Mengubah tampilan form menjadi mode edit
            document.getElementById('form-tx-title').textContent = "📝 Edit Catatan Kas Swadaya";
            document.getElementById('form-tx-title').className = "text-xs font-bold text-amber-400 uppercase tracking-wider";
            document.getElementById('btn-submit-tx').className = "w-full bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold py-3 rounded-lg transition-all shadow-md";
            document.getElementById('btn-submit-tx').textContent = "💾 Perbarui Data Kas";
            document.getElementById('btn-batal-edit').classList.remove('hidden');
            
            // Geser otomatis layar HP ke area form agar nyaman
            document.getElementById('form-tx-title').scrollIntoView({ behavior: 'smooth' });
        };

        window.batalEdit = function() {
            document.getElementById('tx-edit-id').value = "";
            document.getElementById('tx-nama').value = "";
            document.getElementById('tx-nominal').value = "";
            document.getElementById('tx-lokasi').value = "";
            document.getElementById('tx-karung').value = "";
            
            document.getElementById('form-tx-title').textContent = "✍️ Pencatatan Kas Swadaya";
            document.getElementById('form-tx-title').className = "text-xs font-bold text-blue-400 uppercase tracking-wider";
            document.getElementById('btn-submit-tx').className = "w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-3 rounded-lg transition-all shadow-md";
            document.getElementById('btn-submit-tx').textContent = "💾 Simpan Catatan Kas";
            document.getElementById('btn-batal-edit').classList.add('hidden');
        };

        window.simpanTransaksi = async function() {
            if (!activeMusimId) { alert("Pilih sesi musim terlebih dahulu!"); return; }

            const editId = document.getElementById('tx-edit-id').value;
            const jenis = document.querySelector('input[name="tx-jenis"]:checked').value;
            const nama = document.getElementById('tx-nama').value.trim();
            const nominal = document.getElementById('tx-nominal').value.trim();
            const lokasi = document.getElementById('tx-lokasi').value.trim();
            const karung = document.getElementById('tx-karung').value.trim();

            if (!nama || !nominal) { alert("Nama dan nominal uang wajib diisi!"); return; }

            const d = new Date();
            const tglOtomatis = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;

            let payloadData = {
                musimId: activeMusimId,
                jenis: jenis,
                nama: nama,
                nominal: Number(nominal),
                panitia: currentPanitiaName // Nama panitia otomatis tercantum dan terikat pada dokumen
            };

            if (jenis === 'masuk') {
                payloadData.lokasi = lokasi || "Lahan Warga";
                payloadData.jumlahKarung = Number(karung) || 0;
                payloadData.keterangan = "";
            } else {
                payloadData.keterangan = nama;
                payloadData.lokasi = "";
                payloadData.jumlahKarung = 0;
            }

            try {
                const { collection: coll, addDoc: add, doc: docRef, updateDoc: update } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                
                if (editId) {
                    // Eksekusi Update jika dalam mode edit
                    await update(docRef(db, "transaksi", editId), payloadData);
                    alert("Catatan kas berhasil diperbarui!");
                    batalEdit();
                } else {
                    // Eksekusi Simpan Data Baru biasa
                    payloadData.timestamp = d.getTime();
                    payloadData.tanggal = tglOtomatis;
                    await add(coll(db, "transaksi"), payloadData);
                    alert("Catatan kas berhasil disimpan!");
                    batalEdit();
                }
                
                muatHistoriTransaksi(activeMusimId);
            } catch (e) {
                alert("Gagal memproses data kas: " + e.message);
            }
        };

        window.hapusDataTransaksi = async function(id) {
            if (!confirm("Apakah Anda yakin ingin menghapus permanen catatan kas ini?")) return;
            try {
                const { doc: docRef, deleteDoc: del } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                await del(docRef(db, "transaksi", id));
                alert("Catatan kas telah berhasil dihapus!");
                if (document.getElementById('tx-edit-id').value === id) batalEdit();
                muatHistoriTransaksi(activeMusimId);
            } catch (e) {
                alert("Gagal menghapus data: " + e.message);
            }
        };

        loadAdminSystem();
    </script>
</body>
</html>
